<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sitio en construcción</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      color: #111;
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card {
      text-align: center;
      max-width: 28rem;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    p {
      color: #555;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .bar {
      width: 4rem;
      height: 4px;
      background: #2563eb;
      border-radius: 2px;
      margin: 0 auto 2rem;
    }
    .tag {
      display: inline-block;
      background: #e5e7eb;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      font-size: 0.8rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🚧</div>
    <h1>Estamos trabajando</h1>
    <div class="bar"></div>
    <p>Este sitio está en construcción. Pronto tendremos novedades. Gracias por tu paciencia.</p>
    <span class="tag">Próximamente</span>
  </div>
</body>
</html>
